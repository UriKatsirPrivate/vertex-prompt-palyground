# Cloud Build config for the combined Next.js + FastAPI image.
# Invoked by deploy.sh.
steps:
  - name: "gcr.io/cloud-builders/docker"
    args: ["build", "-f", "Dockerfile", "-t", "${_IMAGE}", "."]
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "${_IMAGE}"]
images:
  - "${_IMAGE}"
options:
  logging: CLOUD_LOGGING_ONLY
substitutions:
  _IMAGE: "me-west1-docker.pkg.dev/landing-zone-demo-341118/vertex-prompt-playground/vertex-prompt-playground-web:latest"
